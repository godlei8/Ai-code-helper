spring:
  config:
    import:
      - optional:file:./src/main/resources/application-local.yml
      - optional:file:./application-local.yml
      - optional:file:./config/application-local.yml
  application:
    name: work_helper
  profiles:
       active: local
server:
  port: 8081
  servlet:
    context-path: /api
minimax:
  api-key: <Your MiniMax API Key here>
  base-url: https://api.minimaxi.com/v1
  api-host: https://api.minimaxi.com
  chat-model:
    model-name: MiniMax-M2.7
    timeout-seconds: 120
  streaming-chat-model:
    model-name: MiniMax-M2.7
    timeout-seconds: 120
  mcp:
    command: uvx
    base-path: target/minimax-mcp
    resource-mode: url
